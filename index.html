<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HELLO? White Schizo Dispatch</title>
    <style>
      :root {
        --paper: #ffffff;
        --ink: #050505;
        --red: #050505;
        --blue: #050505;
        --acid: #f2f2f2;
        --soft: rgba(5, 5, 5, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: "Times New Roman", Times, serif;
        letter-spacing: 0;
      }

      .experience {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: var(--paper);
        isolation: isolate;
      }

      .experience::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: -1;
        width: 130vw;
        color: rgba(5, 5, 5, 0.035);
        font-size: clamp(76px, 16vw, 230px);
        font-weight: 700;
        line-height: 0.74;
        text-align: center;
        transform: translate(-50%, -50%) rotate(-8deg);
        pointer-events: none;
      }

      .site-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 12px clamp(14px, 3vw, 40px);
        border-bottom: 1px solid rgba(5, 5, 5, 0.16);
        background: var(--paper);
      }

      .logo {
        color: var(--ink);
        font-size: clamp(28px, 4vw, 58px);
        font-weight: 700;
        line-height: 0.86;
        text-decoration: none;
        white-space: nowrap;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: clamp(12px, 3vw, 38px);
        min-width: 0;
      }

      .nav a {
        color: var(--ink);
        font-size: clamp(15px, 1.8vw, 24px);
        font-weight: 700;
        line-height: 1;
        text-decoration: none;
        white-space: nowrap;
      }

      .nav a:hover {
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 4px;
      }

      .stage {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 0;
        padding: clamp(12px, 3vw, 42px);
      }

      .stream {
        position: relative;
        width: 100%;
        max-width: 100vw;
        height: clamp(190px, 32vh, 300px);
        overflow: hidden;
      }

      .token {
        position: absolute;
        top: 50%;
        display: block;
        max-width: 42vw;
        color: rgba(5, 5, 5, 0.22);
        font-size: clamp(22px, 4.5vw, 78px);
        font-weight: 700;
        line-height: 0.82;
        text-align: center;
        transform: translate(-50%, -50%);
      }

      .token:not(.active) {
        display: none;
      }

      .o-0 {
        left: 50%;
      }

      .token.active {
        max-width: 88vw;
        color: var(--ink);
        font-size: clamp(64px, 12vw, 168px);
        text-shadow: none;
        transform: translate(-50%, -50%);
        white-space: normal;
        overflow-wrap: normal;
        word-break: normal;
      }

      .token.active.long {
        font-size: clamp(42px, 7.4vw, 102px);
        max-width: 92vw;
        overflow-wrap: anywhere;
      }

      .token.active.phrase {
        font-size: clamp(44px, 8.5vw, 118px);
        line-height: 0.9;
      }

      .sentence {
        position: absolute;
        left: 50%;
        bottom: clamp(34px, 8vh, 74px);
        width: min(760px, calc(100vw - 24px));
        color: rgba(5, 5, 5, 0.55);
        font-size: clamp(17px, 2.1vw, 31px);
        font-weight: 700;
        line-height: 1;
        text-align: center;
        transform: translateX(-50%);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .annotation {
        position: absolute;
        z-index: 2;
        max-width: 240px;
        border: 1px solid rgba(5, 5, 5, 0.22);
        background: var(--paper);
        padding: 7px 9px;
        color: rgba(5, 5, 5, 0.48);
        font-size: clamp(11px, 1vw, 15px);
        font-weight: 700;
        line-height: 0.9;
        text-transform: uppercase;
        box-shadow: none;
        pointer-events: none;
      }

      .annotation.red {
        border-color: rgba(5, 5, 5, 0.22);
        color: rgba(5, 5, 5, 0.48);
        box-shadow: none;
      }

      .annotation.blue {
        border-color: rgba(5, 5, 5, 0.22);
        color: rgba(5, 5, 5, 0.48);
        box-shadow: none;
      }

      .a1 {
        left: clamp(12px, 4vw, 62px);
        top: 18%;
        transform: rotate(-4deg);
      }

      .a2 {
        right: clamp(12px, 4vw, 62px);
        top: 24%;
        transform: rotate(3deg);
      }

      .a3 {
        left: clamp(16px, 9vw, 150px);
        bottom: 22%;
        transform: rotate(2deg);
      }

      .a4 {
        right: clamp(14px, 8vw, 132px);
        bottom: 18%;
        transform: rotate(-3deg);
      }

      .ticker {
        display: none;
      }

      .flash {
        display: none;
      }

      @media (max-width: 760px) {
        .site-header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
          padding: 12px 14px;
        }

        .nav {
          justify-content: flex-start;
          flex-wrap: wrap;
          width: 100%;
          row-gap: 7px;
          column-gap: 18px;
        }

        .nav a {
          font-size: clamp(14px, 4vw, 16px);
        }

        .token {
          max-width: 22vw;
          font-size: clamp(18px, 7vw, 42px);
        }

        .token.active {
          max-width: 92vw;
          font-size: clamp(42px, 12vw, 68px);
        }

        .token.active.long {
          font-size: clamp(28px, 8vw, 42px);
        }

        .token.active.phrase {
          font-size: clamp(30px, 9vw, 48px);
        }

        .annotation {
          max-width: 140px;
          padding: 5px 7px;
        }

        .a1 {
          top: 15%;
        }

        .a2 {
          top: 17%;
        }

        .a2,
        .a3,
        .a4 {
          display: none;
        }

        .sentence {
          bottom: 28px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="experience" aria-label="HELLO? white Times New Roman schizo dispatch">

      <header class="site-header" aria-label="Site header">

      <section class="stage" aria-label="Speed-reading text stage">

    </main>

    <template id="copy-source">HELLO? IS THIS NOT INSANE? Are you SEEING this right now? Are your EYES working? Because mine are barely functioning after witnessing what is quite possibly the most universe-altering financial event in the history of human civilization. It is going to make us all millionaires by Thursday. THIS IS GENNY. This is genuinely, certifiably, no-questions-asked, call-your-mother-and-tell-her-you-love-her GENNY. I have been in this space for eleven months and I have never — never — seen a tokenomic structure this immaculate. The total supply? Quadrillions. The utility? The whitepaper? A screenshot of a Telegram message that just says "wen moon 🚀." TEXTBOOK. Absolutely TEXTBOOK fundamentals. Do you understand the NARRATIVE here? Do you understand what is HAPPENING? Elon once tweeted the word "woof" in 2021. A developer in a timezone nobody can identify has connected those dots with the precision of a Swiss watchmaker and the vision of a Renaissance painter. The contract was deployed forty minutes ago. There are six wallets. One of them is almost certainly the developer. THIS IS THE PERFECT TIME FOR THIS NARRATIVE. The stars have aligned. Mercury is no longer in retrograde. My horoscope said "financial opportunity approaches" and I think we all know what that means. The chart? VERTICAL. Completely, aggressively, almost offensively vertical. It went up 4,000% in the last hour and then dropped 80% and then went back up 6,000% and I am choosing to look exclusively at the green candles because that is called analysis. The liquidity? Locked. For ninety days. Which means in ninety days it gets unlocked but we don't talk about that because THIS IS DIFFERENT. This project is different. I can feel it in a way that transcends reason and basic financial literacy. The community? Brother, I cannot even BEGIN to describe the community. There are 47 people in the Telegram and they are the most PASSIONATE, most CONVICTED, most FINANCIALLY RECKLESS group of individuals ever assembled under one cartoon dog banner. Someone just posted a picture of their dog wearing the logo printed on a piece of printer paper. A child has drawn fan art. An anonymous account with a Pepe profile picture just said "WAGMI" for the forty-third time this hour. This is what a movement looks like in its INFANCY. And the developers? They're anonymous, obviously, because that's how you know they're serious. No names, no faces, no LinkedIn profiles, no verifiable human existence whatsoever — and THAT is called humility. They let the CHART do the talking. The chart is currently talking in a language that sounds like a car alarm but I have been assured by someone whose username is "CryptoWizard999" that this is normal price discovery. SURELY THIS /goal MUST GO. I mean — SURELY. SURELY THIS MUST GO. Look at the macro environment. Look at the sentiment. Look at the fact that I have already told fourteen people in my life about this and I cannot emotionally afford to be wrong. The market cap is four hundred thousand dollars which means if it gets to even ONE PERCENT of Bitcoin's market cap I will be able to retire, purchase a yacht, and also possibly buy a small Mediterranean island. The math is right there. I did it on my phone's calculator app. It checks out. This isn't gambling. This is vision. Warren Buffett invests in things he understands. I am investing in a dog with a hat that I also understand. We are the SAME. The only difference is he hasn't discovered this particular dog yet, and when he does — oh, when he does — we are all going to feel very vindicated standing on our yacht-island. Buy now. Or don't. But when this dog with a hat is on the front page of every financial newspaper in the world and your grandchildren ask you where you were when history was made, what are you going to tell them? That you wanted to "do more research"? Disgusting.</template>

    <script>
      const copySource = document.getElementById("copy-source");
      const source = (copySource.content ? copySource.content.textContent : copySource.textContent).trim();
      const words = source.match(/\S+/g) || [];
      const sentences = source.match(/[^.!?]+[.!?]+(?:["”])?/g) || [source];
      const sentenceRanges = [];
      let wordCursor = 0;

      for (const sentence of sentences) {
        const count = (sentence.match(/\S+/g) || []).length;
        sentenceRanges.push({ start: wordCursor, end: wordCursor + count - 1, text: sentence.trim() });
        wordCursor += count;
      }

      const stream = document.getElementById("stream");
      const sentence = document.getElementById("sentence");
      const noteA = document.getElementById("noteA");
      const noteB = document.getElementById("noteB");
      const noteC = document.getElementById("noteC");
      const noteD = document.getElementById("noteD");

      const notes = [
        ["phone calculator verified", "47 people cannot be wrong", "day ninety-one has left the chat", "not financial advice, just destiny"],
        ["whitepaper: wen moon", "developer timezone: unknown", "six wallets. perfect decentralization.", "crypto wizard says normal"],
        ["dog with hat thesis", "yacht-island math checks out", "mercury stopped rugging", "analysis = green candles only"],
        ["humility = no linkedin", "car alarm price discovery", "textbook because I said textbook", "emotionally cannot be wrong"],
        ["buffett has not found dog yet", "grandchildren will ask", "printer-paper logo confirmed", "this is different, probably"]
      ];

      const chunks = buildChunks();
      window.__chunkStats = {
        count: chunks.length,
        maxWords: Math.max(...chunks.map((chunk) => chunk.text.trim().split(/\s+/).length)),
        minWords: Math.min(...chunks.map((chunk) => chunk.text.trim().split(/\s+/).length))
      };
      let chunkIndex = 0;
      let playing = true;
      let timer = 0;

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function sentenceForWord(wordIndex) {
        return sentenceRanges.find((range) => wordIndex >= range.start && wordIndex <= range.end) || sentenceRanges[0];
      }

      function sentenceTone(text) {
        if (/[?!]|GENNY|TEXTBOOK|SURELY|VERTICAL|WAGMI|INSANE|EYES|CHART/.test(text)) return "loud";
        if (text.length > 145) return "ramble";
        return "plain";
      }

      function buildChunks() {
        const output = [];

        sentenceRanges.forEach((range, sentenceIndex) => {
          const sentenceWords = words.slice(range.start, range.end + 1);
          const tone = sentenceTone(range.text);
          let offset = 0;

          while (offset < sentenceWords.length) {
            const remaining = sentenceWords.length - offset;
            const current = sentenceWords[offset] || "";
            let size = tone === "loud" ? 1 : tone === "ramble" ? 3 : 2;

            if (/[?!]$/.test(current) || current.length > 14) size = 1;
            if (remaining <= 3) size = remaining;
            size = Math.max(1, Math.min(3, size));

            const chunkWords = sentenceWords.slice(offset, offset + size);
            output.push({
              endWord: range.start + offset + size - 1,
              sentenceIndex,
              startWord: range.start + offset,
              text: chunkWords.join(" "),
              tone
            });
            offset += size;
          }
        });

        return output;
      }

      function delayForChunk(chunk) {
        const base = chunk.tone === "loud" ? 520 : chunk.tone === "ramble" ? 740 : 620;
        const punctuation = /[.!?]"?$/.test(chunk.text) ? 1.85 : /[,;:]$/.test(chunk.text) ? 1.28 : 1;
        const length = chunk.text.length > 20 ? 1.18 : 1;
        return base * punctuation * length;
      }

      function renderStream() {
        const chunk = chunks[chunkIndex] || chunks[0];
        const phrase = /\s/.test(chunk.text);
        const long = chunk.text.length > 18;
        const classes = ["token", "o-0", "active", phrase ? "phrase" : "", long ? "long" : ""].filter(Boolean).join(" ");
        stream.innerHTML = `<span class="${classes}">${escapeHtml(chunk.text)}</span>`;
      }

      function renderNotes() {
        const chunk = chunks[chunkIndex] || chunks[0];
        const set = notes[Math.floor(chunk.startWord / 28) % notes.length];
        noteA.textContent = set[0];
        noteB.textContent = set[1];
        noteC.textContent = set[2];
        noteD.textContent = set[3];
      }

      function render() {
        const chunk = chunks[chunkIndex] || chunks[0];
        renderStream();
        renderNotes();
        sentence.textContent = sentenceForWord(chunk.startWord).text;
      }

      function next() {
        if (!playing) return;

        chunkIndex = (chunkIndex + 1) % chunks.length;
        render();
        timer = window.setTimeout(next, delayForChunk(chunks[chunkIndex] || chunks[0]));
      }

      function play() {
        if (playing) return;
        playing = true;
        timer = window.setTimeout(next, delayForChunk(chunks[chunkIndex] || chunks[0]));
      }

      function pause() {
        playing = false;
        window.clearTimeout(timer);
      }

      function reset() {
        pause();
        chunkIndex = 0;
        render();
      }

      document.addEventListener("click", () => {
        if (playing) {
          pause();
        } else {
          play();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          event.preventDefault();
          if (playing) {
            pause();
          } else {
            play();
          }
        }

        if (event.key === "ArrowRight") {
          pause();
          chunkIndex = Math.min(chunks.length - 1, chunkIndex + 1);
          render();
        }

        if (event.key === "ArrowLeft") {
          pause();
          chunkIndex = Math.max(0, chunkIndex - 1);
          render();
        }
      });

      render();
      timer = window.setTimeout(next, delayForChunk(chunks[chunkIndex] || chunks[0]));
    </script>
  </body>
